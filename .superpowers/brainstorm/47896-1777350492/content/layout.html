<h2>整体布局结构</h2>
<p class="subtitle">RSS 阅读器的核心布局 - 你更偏好哪种方式？</p>

<div class="options">
  <div class="option" data-choice="sidebar-main" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>侧边栏 + 主内容区 (与现有相似)</h3>
      <p>左侧固定宽度订阅列表，右侧自适应文章内容。熟悉的 RSS 阅读器布局。</p>
    </div>
  </div>
  <div class="option" data-choice="tabs-switch" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>顶部 Tab 切换</h3>
      <p>顶部导航栏放订阅源，点击后主区域显示文章列表，再点击显示详情。移动端友好。</p>
    </div>
  </div>
  <div class="option" data-choice="single-page" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>单页 + 模态框</h3>
      <p>所有内容在一个页面，订阅列表在顶部，点击文章时右侧滑出或弹出详情面板。</p>
    </div>
  </div>
</div>
