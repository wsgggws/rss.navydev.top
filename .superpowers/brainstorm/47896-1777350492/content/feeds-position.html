<h2>订阅列表与文章列表的关系</h2>
<p class="subtitle">如何组织这两种列表的位置和层级</p>

<div class="options">
  <div class="option" data-choice="top-feeds" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>顶部横向滚动选择器</h3>
      <p>订阅源作为顶部横向标签栏，点击切换显示对应文章列表。简洁切换快。</p>
    </div>
  </div>
  <div class="option" data-choice="left-sidebar" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>左侧固定边栏</h3>
      <p>订阅源常驻左侧面板，右侧是文章列表。类似 Twitter/X 的侧边导航。</p>
    </div>
  </div>
  <div class="option" data-choice="dropdown" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>下拉选择器</h3>
      <p>顶部一个下拉框选择订阅源，主体显示文章列表。最小化空间占用。</p>
    </div>
  </div>
</div>
