<h2>订阅列表与文章列表的呈现方式</h2>
<p class="subtitle">列表项的设计风格</p>

<div class="options">
  <div class="option" data-choice="compact-list" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>紧凑文字列表</h3>
      <p>纯文字标题 + 时间，一行一个，节省空间，适合信息密度高的阅读。</p>
    </div>
  </div>
  <div class="option" data-choice="card-list" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>卡片式列表</h3>
      <p>每个文章一张卡片，包含标题 + 摘要 + 时间 + 来源。视觉更丰富。</p>
    </div>
  </div>
  <div class="option" data-choice="magazine" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>杂志式图文混排</h3>
      <p>文章配图在左，文字在右，类似 Medium 的阅读体验。图片优先。</p>
    </div>
  </div>
</div>
